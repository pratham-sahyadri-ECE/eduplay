<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocket Race – Math Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --blue: #00c6ff;
            --red: #ff4e50;
            --gold: #f9ca24;
            --purple: #a855f7;
            --bg: #030310;
            --panel-border: rgba(255, 255, 255, 0.09);
            --text-dim: rgba(255, 255, 255, 0.45);
            --font-racing: 'Orbitron', monospace;
            --font-body: 'Inter', sans-serif;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: var(--font-body);
            overflow: hidden;
            height: 100vh;
        }

        /* HUD top */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--panel-border);
        }

        .hud-team {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .hud-team.right {
            align-items: flex-end;
        }

        .team-name {
            font-family: var(--font-racing);
            font-size: .65rem;
            letter-spacing: 2px;
        }

        .score-big {
            font-family: var(--font-racing);
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1;
        }

        .score-big.blue {
            color: var(--blue);
            text-shadow: 0 0 20px var(--blue);
        }

        .score-big.purple {
            color: var(--purple);
            text-shadow: 0 0 20px var(--purple);
        }

        .hud-center {
            text-align: center;
        }

        .q-box {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 12px;
            padding: 8px 18px;
        }

        .q-label {
            font-family: var(--font-racing);
            font-size: .55rem;
            letter-spacing: 2px;
            color: var(--purple);
        }

        .q-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 2px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .canvas-wrap {
            position: fixed;
            inset: 0;
            top: 74px;
        }

        /* Altitude bars — vertical on sides */
        .alt-bars {
            position: fixed;
            top: 80px;
            bottom: 55px;
            z-index: 10;
            width: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
        }

        .alt-bars.left {
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid var(--panel-border);
        }

        .alt-bars.right {
            right: 0;
            background: rgba(0, 0, 0, 0.4);
            border-left: 1px solid var(--panel-border);
        }

        .alt-label {
            font-family: var(--font-racing);
            font-size: .45rem;
            letter-spacing: 1px;
            writing-mode: vertical-rl;
        }

        .alt-track {
            flex: 1;
            width: 14px;
            border-radius: 7px;
            background: rgba(255, 255, 255, .08);
            overflow: hidden;
            position: relative;
        }

        .alt-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-radius: 7px;
            transition: height .5s cubic-bezier(.34, 1.56, .64, 1);
        }

        .fill-a-v {
            background: linear-gradient(0deg, #0072ff, #00c6ff);
            box-shadow: 0 -4px 12px #00c6ff88;
        }

        .fill-b-v {
            background: linear-gradient(0deg, #9333ea, #a855f7);
            box-shadow: 0 -4px 12px #a855f788;
        }

        .alt-pct {
            font-family: var(--font-racing);
            font-size: .55rem;
            letter-spacing: 1px;
        }

        .finish-stripe {
            position: absolute;
            top: 0;
            left: -2px;
            right: -2px;
            height: 8px;
            background: repeating-linear-gradient(90deg, #fff 0, #fff 4px, #000 4px, #000 8px);
            border-radius: 4px;
        }

        /* Input */
        .input-row {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--panel-border);
            height: 50px;
        }

        .input-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
        }

        .input-cell.right {
            border-left: 1px solid var(--panel-border);
        }

        .input-cell input {
            flex: 1;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 8px;
            padding: 6px 10px;
            color: #fff;
            font-size: .9rem;
            font-family: var(--font-racing);
            outline: none;
        }

        .input-cell input:focus {
            border-color: var(--purple);
        }

        .input-cell button {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: var(--font-racing);
            font-size: .58rem;
            letter-spacing: 1px;
            font-weight: 700;
            transition: transform .2s;
        }

        .btn-a {
            background: linear-gradient(135deg, var(--blue), #0072ff);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 198, 255, .4);
        }

        .btn-b {
            background: linear-gradient(135deg, var(--purple), #ec4899);
            color: #fff;
            box-shadow: 0 0 10px rgba(168, 85, 247, .4);
        }

        /* Feedback */
        .answer-feedback {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 24px;
            border-radius: 30px;
            font-family: var(--font-racing);
            font-size: .72rem;
            letter-spacing: 1px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .3s;
            z-index: 20;
            white-space: nowrap;
        }

        .answer-feedback.correct {
            background: rgba(168, 85, 247, .2);
            border: 1px solid var(--purple);
            color: var(--purple);
        }

        .answer-feedback.wrong {
            background: rgba(255, 78, 80, .2);
            border: 1px solid var(--red);
            color: var(--red);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(18px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-title {
            font-family: var(--font-racing);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            text-align: center;
        }

        .overlay-sub {
            font-size: .9rem;
            color: var(--text-dim);
            text-align: center;
        }

        .overlay-btn {
            padding: 14px 36px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: var(--font-racing);
            font-size: .75rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--purple), #ec4899);
            color: #fff;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(168, 85, 247, .5);
            transition: transform .2s;
        }

        .overlay-btn:hover {
            transform: scale(1.06);
        }

        .countdown-num {
            font-family: var(--font-racing);
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 900;
            animation: pop .4s ease;
        }

        @keyframes pop {
            from {
                transform: scale(1.8);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .neon-gold {
            color: var(--gold);
            text-shadow: 0 0 40px var(--gold);
        }

        .neon-purple {
            color: var(--purple);
            text-shadow: 0 0 40px var(--purple);
        }

        #confettiCanvas {
            position: fixed;
            inset: 0;
            z-index: 60;
            pointer-events: none;
        }

        .back-btn {
            position: fixed;
            top: 14px;
            right: 16px;
            z-index: 20;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            color: rgba(255, 255, 255, .6);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: .65rem;
            cursor: pointer;
            font-family: var(--font-racing);
            letter-spacing: 1px;
            transition: all .2s;
        }

        /* WS dot */
        .ws-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-racing);
            font-size: .52rem;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ws-dot.connected {
            background: #00e676;
            box-shadow: 0 0 6px #00e676;
        }

        .ws-dot.disconnected {
            background: #666;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .13);
            color: #fff;
        }
    </style>
</head>

    <!-- Enhanced Keypad Integration -->
    <script>
    (function() {
        'use strict';
        const WS_HOST = 'localhost';
        const WS_PORT = 8765;
        const RECONNECT_DELAY = 3000;
        let socket = null;
        let reconnectTimer = null;
        let isConnected = false;
        
        function connect() {
            try {
                socket = new WebSocket(`ws://${WS_HOST}:${WS_PORT}`);
                socket.onopen = function() {
                    console.log('✅ Keypad connected');
                    isConnected = true;
                    if (typeof setWsDot === 'function') setWsDot(true);
                    if (reconnectTimer) clearTimeout(reconnectTimer);
                };
                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.team && data.key) {
                            handleInput(data.team, data.key);
                        }
                    } catch (e) {
                        const raw = event.data.trim();
                        const match = raw.match(/^([AB]):(.+)$/i);
                        if (match && typeof handleAnswer === 'function') {
                            handleAnswer(match[1].toUpperCase(), match[2]);
                        }
                    }
                };
                socket.onerror = function() {
                    isConnected = false;
                    if (typeof setWsDot === 'function') setWsDot(false);
                };
                socket.onclose = function() {
                    isConnected = false;
                    if (typeof setWsDot === 'function') setWsDot(false);
                    reconnectTimer = setTimeout(connect, RECONNECT_DELAY);
                };
            } catch (error) {
                reconnectTimer = setTimeout(connect, RECONNECT_DELAY);
            }
        }
        
        function handleInput(team, key) {
            const input = document.getElementById('input' + team);
            if (!input) return;
            if (key === '#') {
                const btn = document.getElementById('submit' + team);
                if (btn) btn.click();
            } else if (key === '*') {
                input.value = '';
            } else if (/^[0-9\-.]$/.test(key)) {
                input.value += key;
            }
        }
        
        window.KeypadBridge = { isConnected: () => isConnected, reconnect: connect };
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', connect);
        } else {
            connect();
        }
    })();
    </script>
    
    <script>
        // ── WebSocket (ESP32 keypad) ─────────────────────────────────────
        let ws = null, wsConnected = false;
        function connectWS() {
            try {
                ws = new WebSocket('ws://localhost:8765');
                ws.onopen = () => { wsConnected = true; setWsDot(true); };
                ws.onclose = () => { wsConnected = false; setWsDot(false); setTimeout(connectWS, 3000); };
                ws.onerror = () => { };
                ws.onmessage = (ev) => {
                    const match = ev.data.trim().match(/^([AB]):(.+)$/i);
                    if (match && GS.state === GameLogic.STATE.RACING && GS.currentQuestion) {
                        handleAnswer(match[1].toUpperCase(), match[2]);
                    }
                };
            } catch (e) { }
        }
        function sendWS(cmd) { if (ws && wsConnected) try { ws.send(cmd); } catch (e) { } }
        function setWsDot(on) {
            const dot = document.getElementById('wsDot'), txt = document.getElementById('wsStatus');
            if (dot) dot.className = 'ws-dot ' + (on ? 'connected' : 'disconnected');
            if (txt) txt.textContent = on ? 'ESP32 Connected' : 'No Hardware';
        }

        const params = new URLSearchParams(window.location.search);
        const CONFIG = {
            nameA: params.get('tA') || 'Team A',
            nameB: params.get('tB') || 'Team B',
            difficulty: params.get('diff') || 'medium',
            avA: params.get('avA') || '👦',
            avB: params.get('avB') || '👧',
            gameMode: 'rocket',
        };

        const GS = GameLogic.createGameState({ difficulty: CONFIG.difficulty, nameA: CONFIG.nameA, nameB: CONFIG.nameB, raceLength: 6 });
        const rktA = new Physics.Vehicle({ boostPower: 0.95, maxVel: 3.0 });
        const rktB = new Physics.Vehicle({ boostPower: 0.95, maxVel: 3.0 });

        const canvas = document.getElementById('rocketCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.addEventListener('resize', resize); resize();

        // Scrolling state
        let starScroll = 0;
        let stars = [];
        let planets = [];
        // initialize stars
        for (let i = 0; i < 160; i++) {
            stars.push({ x: Math.random(), y: Math.random(), r: 0.4 + Math.random() * 1.6, speed: 0.2 + Math.random() * 0.6, alpha: 0.4 + Math.random() * 0.6 });
        }
        for (let i = 0; i < 4; i++) {
            planets.push({
                x: 0.1 + Math.random() * 0.8, y: Math.random(), r: 20 + Math.random() * 30,
                color: ['#a855f7', '#ec4899', '#f97316', '#06b6d4'][i], speed: 0.05 + Math.random() * 0.1
            });
        }

        // Particle arrays
        const thrustParticlesA = [];
        const thrustParticlesB = [];
        const explosionParticles = [];

        function spawnThrust(arr, x, y, color) {
            for (let i = 0; i < 5; i++) {
                arr.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: 2 + Math.random() * 4,
                    life: 1, decay: 0.06 + Math.random() * 0.04,
                    size: 4 + Math.random() * 6,
                    color
                });
            }
        }

        function updateParticles(arr) {
            for (let i = arr.length - 1; i >= 0; i--) {
                arr[i].x += arr[i].vx; arr[i].y += arr[i].vy;
                arr[i].life -= arr[i].decay;
                if (arr[i].life <= 0) arr.splice(i, 1);
            }
        }

        function drawParticles(arr) {
            for (const p of arr) {
                ctx.globalAlpha = p.life;
                const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                g.addColorStop(0, '#fff');
                g.addColorStop(0.3, p.color);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function drawBackground() {
            const W = canvas.width, H = canvas.height;

            // Deep space gradient
            const bg = ctx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0, '#000008');
            bg.addColorStop(0.5, '#03031a');
            bg.addColorStop(1, '#0a0318');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // Nebula clouds
            const nebula = ctx.createRadialGradient(W * 0.3, H * 0.3, 0, W * 0.3, H * 0.3, W * 0.45);
            nebula.addColorStop(0, 'rgba(100,0,180,0.06)');
            nebula.addColorStop(1, 'transparent');
            ctx.fillStyle = nebula;
            ctx.fillRect(0, 0, W, H);

            const nebula2 = ctx.createRadialGradient(W * 0.75, H * 0.65, 0, W * 0.75, H * 0.65, W * 0.35);
            nebula2.addColorStop(0, 'rgba(0,80,180,0.05)');
            nebula2.addColorStop(1, 'transparent');
            ctx.fillStyle = nebula2;
            ctx.fillRect(0, 0, W, H);

            // Stars (scrolling downward = going up)
            for (const s of stars) {
                const sx = s.x * W;
                const sy = ((s.y * H + starScroll * s.speed) % H + H) % H;
                const alpha = s.alpha * (0.5 + 0.5 * Math.sin(s.x * 10 + starScroll * 0.02));
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, Math.PI * 2); ctx.fill();
            }

            // Planets
            for (const p of planets) {
                const px = p.x * W;
                const py = ((p.y * H + starScroll * p.speed) % H + H) % H;
                // Planet body
                const pg = ctx.createRadialGradient(px - p.r * 0.3, py - p.r * 0.3, 0, px, py, p.r);
                pg.addColorStop(0, p.color + 'ff');
                pg.addColorStop(0.6, p.color + 'bb');
                pg.addColorStop(1, p.color + '22');
                ctx.fillStyle = pg;
                ctx.beginPath(); ctx.arc(px, py, p.r, 0, Math.PI * 2); ctx.fill();
                // Ring
                ctx.strokeStyle = p.color + '55';
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.ellipse(px, py, p.r * 1.7, p.r * 0.35, -0.3, 0, Math.PI * 2); ctx.stroke();
            }
        }

        function drawRocket(rkt, x, y, colorA, colorB, avatar, label) {
            const isBoosting = rkt.isBoosting;
            ctx.save();
            ctx.translate(x, y);

            if (isBoosting) { ctx.shadowBlur = 32; ctx.shadowColor = colorA; }

            // Rocket body
            const rh = 70, rw = 30;
            const grad = ctx.createLinearGradient(-rw / 2, -rh, rw / 2, 0);
            grad.addColorStop(0, colorA + 'ee');
            grad.addColorStop(0.6, colorB + 'aa');
            grad.addColorStop(1, colorB + '44');
            ctx.fillStyle = grad;
            // Body
            ctx.beginPath();
            ctx.moveTo(0, -rh);
            ctx.lineTo(rw / 2, -rh * 0.3);
            ctx.lineTo(rw / 2, rh * 0.2);
            ctx.lineTo(-rw / 2, rh * 0.2);
            ctx.lineTo(-rw / 2, -rh * 0.3);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = colorA;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Nose cone
            ctx.beginPath();
            ctx.moveTo(0, -rh * 1.2);
            ctx.lineTo(rw / 2, -rh * 0.3);
            ctx.lineTo(-rw / 2, -rh * 0.3);
            ctx.closePath();
            ctx.fillStyle = colorA + 'ee';
            ctx.shadowBlur = 0;
            ctx.fill();

            // Fins
            ctx.fillStyle = colorB + 'cc';
            // Left fin
            ctx.beginPath();
            ctx.moveTo(-rw / 2, rh * 0.0);
            ctx.lineTo(-rw * 1.2, rh * 0.35);
            ctx.lineTo(-rw / 2, rh * 0.2);
            ctx.closePath(); ctx.fill();
            // Right fin
            ctx.beginPath();
            ctx.moveTo(rw / 2, rh * 0.0);
            ctx.lineTo(rw * 1.2, rh * 0.35);
            ctx.lineTo(rw / 2, rh * 0.2);
            ctx.closePath(); ctx.fill();

            // Window
            ctx.fillStyle = '#c8f0ff';
            ctx.shadowBlur = 8; ctx.shadowColor = '#00c6ff';
            ctx.beginPath(); ctx.arc(0, -rh * 0.5, 9, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.font = '11px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(avatar, 0, -rh * 0.5);

            // Engine exhaust flame
            const flameH = isBoosting ? 40 : 14;
            const flameColors = isBoosting
                ? [['#fff', '#ffe082', '#ff6f00', 'transparent'], ['#ffe082', '#ff6f00', '#ff1744', 'transparent']]
                : [['#ffe082', '#ff6f00', 'transparent']];

            for (const fc of flameColors) {
                const fg = ctx.createLinearGradient(0, rh * 0.2, 0, rh * 0.2 + flameH);
                fc.forEach((c, i) => fg.addColorStop(i / (fc.length - 1), c));
                ctx.fillStyle = fg;
                ctx.globalAlpha = isBoosting ? 0.9 : 0.6;
                ctx.beginPath();
                ctx.ellipse(0, rh * 0.2 + flameH / 2, rw / 3, flameH / 2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Label
            ctx.font = 'bold 10px Orbitron,monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
            ctx.shadowBlur = 8; ctx.shadowColor = colorA;
            ctx.fillStyle = colorA;
            ctx.fillText(label, 0, -rh * 1.2 - 10);
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        // Track columns (vertical)
        function drawTrackColumns() {
            const W = canvas.width, H = canvas.height;
            const colW = W * 0.28;
            const colAX = W * 0.22;
            const colBX = W * 0.78;

            // Left track (Team A)
            const tga = ctx.createLinearGradient(colAX - colW / 2, 0, colAX + colW / 2, 0);
            tga.addColorStop(0, 'rgba(0,114,255,0.04)');
            tga.addColorStop(0.5, 'rgba(0,198,255,0.09)');
            tga.addColorStop(1, 'rgba(0,114,255,0.04)');
            ctx.fillStyle = tga;
            ctx.fillRect(colAX - colW / 2, 0, colW, H);
            // Edge lines A
            ctx.strokeStyle = 'rgba(0,198,255,0.25)';
            ctx.lineWidth = 2;
            ctx.setLineDash([12, 18]);
            ctx.beginPath(); ctx.moveTo(colAX - colW / 2, 0); ctx.lineTo(colAX - colW / 2, H); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(colAX + colW / 2, 0); ctx.lineTo(colAX + colW / 2, H); ctx.stroke();

            // Right track (Team B)
            const tgb = ctx.createLinearGradient(colBX - colW / 2, 0, colBX + colW / 2, 0);
            tgb.addColorStop(0, 'rgba(168,85,247,0.04)');
            tgb.addColorStop(0.5, 'rgba(168,85,247,0.09)');
            tgb.addColorStop(1, 'rgba(168,85,247,0.04)');
            ctx.fillStyle = tgb;
            ctx.fillRect(colBX - colW / 2, 0, colW, H);
            ctx.strokeStyle = 'rgba(168,85,247,0.25)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(colBX - colW / 2, 0); ctx.lineTo(colBX - colW / 2, H); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(colBX + colW / 2, 0); ctx.lineTo(colBX + colW / 2, H); ctx.stroke();
            ctx.setLineDash([]);

            // Finish line at top
            const finishY = H * 0.08;
            ctx.strokeStyle = '#f9ca24';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10; ctx.shadowColor = '#f9ca24';
            ctx.beginPath(); ctx.moveTo(colAX - colW / 2 + 4, finishY); ctx.lineTo(colAX + colW / 2 - 4, finishY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(colBX - colW / 2 + 4, finishY); ctx.lineTo(colBX + colW / 2 - 4, finishY); ctx.stroke();
            ctx.shadowBlur = 0;

            // Checkered finish
            for (let c = 0; c < 6; c++) {
                ctx.fillStyle = c % 2 === 0 ? '#fff' : '#000';
                ctx.fillRect(colAX - colW / 2 + 4 + c * (colW / 6), finishY - 4, colW / 6, 4);
                ctx.fillRect(colBX - colW / 2 + 4 + c * (colW / 6), finishY - 4, colW / 6, 4);
            }
            ctx.font = 'bold 9px Orbitron,monospace'; ctx.fillStyle = '#f9ca24'; ctx.textAlign = 'center';
            ctx.fillText('FINISH', colAX, finishY - 12);
            ctx.fillText('FINISH', colBX, finishY - 12);

            return { colAX, colBX, colW, finishY, startY: H * 0.9 };
        }

        let lastT = 0;
        function gameLoop(ts) {
            requestAnimationFrame(gameLoop);
            const dt = Math.min((ts - lastT) / 16.67, 3); lastT = ts;

            if (GS.state === GameLogic.STATE.RACING) {
                starScroll += (rktA.vel + rktB.vel) * 1.5 + 0.5;
                rktA.update(dt); rktB.update(dt);
                if (!GS.winner) {
                    const w = GameLogic.checkVictory(GS, rktA, rktB);
                    if (w) triggerVictory(w);
                }
                updateParticles(thrustParticlesA);
                updateParticles(thrustParticlesB);
            }

            Physics.updateShake();
            const W = canvas.width, H = canvas.height;
            ctx.save();
            ctx.translate(Physics.shake.x, Physics.shake.y);
            ctx.clearRect(-10, -10, W + 20, H + 20);

            drawBackground();
            const { colAX, colBX, colW, finishY, startY } = drawTrackColumns();

            // Rocket Y positions: progress 0 = bottom, 1 = top (finishY)
            const rktAY = startY - rktA.progress * (startY - finishY);
            const rktBY = startY - rktB.progress * (startY - finishY);

            // Thrust particles
            if (GS.state === GameLogic.STATE.RACING && rktA.isBoosting) spawnThrust(thrustParticlesA, colAX, rktAY + 50, '#ff6f00');
            if (GS.state === GameLogic.STATE.RACING && rktB.isBoosting) spawnThrust(thrustParticlesB, colBX, rktBY + 50, '#ff6f00');

            drawParticles(thrustParticlesA);
            drawParticles(thrustParticlesB);

            drawRocket(rktA, colAX, rktAY, '#00c6ff', '#0072ff', CONFIG.avA, CONFIG.nameA);
            drawRocket(rktB, colBX, rktBY, '#a855f7', '#ec4899', CONFIG.avB, CONFIG.nameB);

            ctx.restore();

            // Altitude UI
            const pA = Math.round(rktA.progress * 100);
            const pB = Math.round(rktB.progress * 100);
            document.getElementById('altA').style.height = pA + '%';
            document.getElementById('altB').style.height = pB + '%';
            document.getElementById('altPctA').textContent = pA + '%';
            document.getElementById('altPctB').textContent = pB + '%';
            document.getElementById('scoreA').textContent = GS.teamA.score;
            document.getElementById('scoreB').textContent = GS.teamB.score;
        }
        requestAnimationFrame(gameLoop);

        function handleAnswer(team, raw) {
            if (GS.state !== GameLogic.STATE.RACING) return;
            const result = GameLogic.validateAnswer(GS, team, raw);
            GameLogic.applyAnswer(GS, team, result.correct);
            if (result.correct) {
                AudioEngine.playEngineBoost();
                const rkt = team === 'A' ? rktA : rktB;
                rkt.boost();
                rkt.directBoost(1 / 6);
                Physics.triggerShake(6);
                showFeedback(team, true, raw);
                sendWS(team === 'A' ? 'MOVE_A' : 'MOVE_B');
                setTimeout(() => {
                    const w = GameLogic.checkVictory(GS, rktA, rktB);
                    if (w) { triggerVictory(w); return; }
                    setTimeout(showNextQ, 500);
                }, 200);
            } else {
                AudioEngine.playBuzz();
                showFeedback(team, false, raw);
                sendWS(team === 'A' ? 'BUZZ_A' : 'BUZZ_B');
                setTimeout(showNextQ, 500);
            }
        }

        function showFeedback(team, correct, ans) {
            const name = team === 'A' ? CONFIG.nameA : CONFIG.nameB;
            const el = document.getElementById('answerFeedback');
            el.textContent = correct ? `✅ ${name}: ${ans} — CORRECT! Blast off! 🚀` : `❌ ${name}: ${ans} — Wrong!`;
            el.className = 'answer-feedback ' + (correct ? 'correct' : 'wrong');
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 1800);
        }

        function showNextQ() {
            if (GS.state !== GameLogic.STATE.RACING) return;
            const q = GameLogic.nextQuestion(GS);
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('questionNum').textContent = 'Q' + (GS.questionNum + 1);
        }

        function triggerVictory(winner) {
            GS.state = GameLogic.STATE.VICTORY;
            AudioEngine.playVictory();
            const name = winner === 'A' ? CONFIG.nameA : CONFIG.nameB;
            const winTeam = winner === 'A' ? GS.teamA : GS.teamB;
            const loseTeam = winner === 'A' ? GS.teamB : GS.teamA;
            const elapsed = GS.startTime ? Math.round((Date.now() - GS.startTime) / 1000) : null;
            GameLogic.saveResult({ ...CONFIG, avA: winner === 'A' ? CONFIG.avA : CONFIG.avB }, winTeam, winTeam.score, winTeam.correct, GS.questionNum, elapsed);
            GameLogic.saveResult({ ...CONFIG, avA: winner === 'A' ? CONFIG.avB : CONFIG.avA }, loseTeam, loseTeam.score, loseTeam.correct, GS.questionNum, elapsed);
            document.getElementById('victoryTeam').textContent = name + ' REACHES THE STARS! 🌟';
            document.getElementById('victoryTeam').style.color = winner === 'A' ? '#00c6ff' : '#a855f7';
            document.getElementById('victoryScores').textContent = `Boosts: ${winTeam.score} | Questions: ${GS.questionNum}`;
            document.getElementById('victoryOverlay').classList.add('visible');
            const cc = document.getElementById('confettiCanvas');
            cc.width = window.innerWidth; cc.height = window.innerHeight;
            new Physics.ConfettiSystem(cc).start();
        }

        function startCountdown() {
            GS.state = GameLogic.STATE.COUNTDOWN;
            const ov = document.getElementById('countdownOverlay');
            const num = document.getElementById('countdownNum');
            ov.classList.add('visible');
            let count = 3;
            num.textContent = count;
            AudioEngine.playCountdownBeep(440);
            const iv = setInterval(() => {
                count--;
                if (count > 0) {
                    num.textContent = count;
                    num.style.animation = 'none'; void num.offsetWidth; num.style.animation = '';
                    AudioEngine.playCountdownBeep(440);
                } else {
                    clearInterval(iv);
                    num.textContent = '🚀'; num.className = 'countdown-num neon-gold';
                    num.style.animation = 'none'; void num.offsetWidth; num.style.animation = '';
                    AudioEngine.playGo();
                    setTimeout(() => { ov.classList.remove('visible'); beginRace(); }, 700);
                }
            }, 900);
        }

        function beginRace() {
            GS.state = GameLogic.STATE.RACING;
            GS.startTime = Date.now();
            AudioEngine.startRaceAmbience();
            showNextQ();
        }

        document.getElementById('submitA').addEventListener('click', () => submitTeam('A'));
        document.getElementById('submitB').addEventListener('click', () => submitTeam('B'));
        document.getElementById('inputA').addEventListener('keydown', e => { if (e.key === 'Enter') submitTeam('A'); });
        document.getElementById('inputB').addEventListener('keydown', e => { if (e.key === 'Enter') submitTeam('B'); });

        function submitTeam(team) {
            if (GS.state !== GameLogic.STATE.RACING) return;
            const inp = document.getElementById('input' + team);
            const raw = inp.value.trim();
            if (!raw) return;
            handleAnswer(team, raw);
            inp.value = ''; inp.focus();
        }

        document.getElementById('teamAName').textContent = CONFIG.nameA;
        document.getElementById('teamBName').textContent = CONFIG.nameB;
        connectWS();
        startCountdown();
    </script>
</body>

</html>
