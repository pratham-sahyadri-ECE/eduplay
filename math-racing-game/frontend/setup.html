<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setup – Math Racing</title>
    <meta name="description" content="Configure your Math Racing match: choose teams, vehicles and difficulty." />
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            padding: 20px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .top-bar h1 {
            font-size: 1rem;
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        @media (max-width: 680px) {
            .setup-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            padding: 26px;
        }

        .card-title {
            font-family: var(--font-racing);
            font-size: .7rem;
            letter-spacing: 2.5px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--panel-border);
        }

        .team-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .team-a input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0, 198, 255, .15);
        }

        .team-b input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(255, 78, 80, .15);
        }

        .team-a .team-label {
            color: var(--blue);
        }

        .team-b .team-label {
            color: var(--red);
        }

        .team-label {
            font-family: var(--font-racing);
            font-size: .7rem;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .section-full {
            grid-column: 1 / -1;
        }

        .start-wrap {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .preview-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-radius: 12px;
            background: linear-gradient(90deg, rgba(0, 114, 255, .12), rgba(192, 57, 43, .12));
            border: 1px solid rgba(255, 255, 255, .1);
            width: 100%;
            max-width: 520px;
            font-family: var(--font-racing);
            font-size: .85rem;
        }

        .preview-vs {
            font-size: 1.3rem;
            color: var(--gold);
        }

        .links {
            display: flex;
            gap: 12px;
            font-size: .8rem;
        }

        .links a {
            color: var(--text-dim);
            text-decoration: none;
            transition: var(--transition);
        }

        .links a:hover {
            color: var(--blue);
        }
    </style>
</head>

<body>
    <div class="bg-animated"></div>

    <div class="top-bar">
        <h1 class="title-racing"><span id="modeIcon">🏎️</span> Math Racing – <span id="modeName">Car Race</span></h1>
        <div class="links">
            <a href="index.html">🎮 Game Select</a>
            <a href="leaderboard.html">🏆 Leaderboard</a>
        </div>
    </div>

    <div class="setup-grid">

        <!-- ── Class & Difficulty ─────────────────────────────── -->
        <div class="glass card">
            <div class="card-title">⚙️ Match Settings</div>

            <div class="form-group">
                <label>Class / Grade</label>
                <select id="classGrade">
                    <option value="3">3rd Grade</option>
                    <option value="4">4th Grade</option>
                    <option value="5" selected>5th Grade</option>
                    <option value="6">6th Grade</option>
                    <option value="7">7th Grade</option>
                    <option value="8">8th Grade</option>
                    <option value="9">9th Grade</option>
                    <option value="10">10th Grade</option>
                </select>
            </div>

            <div class="form-group mt-3">
                <label>Difficulty</label>
                <div class="diff-group">
                    <div class="diff-pill easy" data-diff="easy">Easy</div>
                    <div class="diff-pill medium selected" data-diff="medium">Medium</div>
                    <div class="diff-pill hard" data-diff="hard">Hard</div>
                </div>
            </div>

            <div class="form-group mt-3">
                <label>Race Length</label>
                <select id="raceLength">
                    <option value="5">Quick Race (5 questions)</option>
                    <option value="10" selected>Standard (10 questions)</option>
                    <option value="15">Extended (15 questions)</option>
                    <option value="20">Marathon (20 questions)</option>
                </select>
            </div>
        </div>

        <!-- ── Team Names ─────────────────────────────────────── -->
        <div class="glass card">
            <div class="card-title">👥 Teams</div>
            <div class="team-row">
                <div class="team-a">
                    <div class="team-label">🔵 Team A</div>
                    <input type="text" id="nameA" placeholder="Enter name…" maxlength="14" />
                </div>
                <div class="team-b">
                    <div class="team-label">🔴 Team B</div>
                    <input type="text" id="nameB" placeholder="Enter name…" maxlength="14" />
                </div>
            </div>

            <div class="form-group mt-3">
                <label>Avatar – Team A</label>
                <div class="option-group" id="avatarA">
                    <div class="option-card selected" data-val="👦"><span class="icon">👦</span>Boy</div>
                    <div class="option-card" data-val="👧"><span class="icon">👧</span>Girl</div>
                    <div class="option-card" data-val="🤖"><span class="icon">🤖</span>Robot</div>
                    <div class="option-card" data-val="🥷"><span class="icon">🥷</span>Ninja</div>
                    <div class="option-card" data-val="🏃"><span class="icon">🏃</span>Athlete</div>
                </div>
            </div>

            <div class="form-group mt-3">
                <label>Avatar – Team B</label>
                <div class="option-group" id="avatarB">
                    <div class="option-card" data-val="👦"><span class="icon">👦</span>Boy</div>
                    <div class="option-card selected" data-val="👧"><span class="icon">👧</span>Girl</div>
                    <div class="option-card" data-val="🤖"><span class="icon">🤖</span>Robot</div>
                    <div class="option-card" data-val="🥷"><span class="icon">🥷</span>Ninja</div>
                    <div class="option-card" data-val="🏃"><span class="icon">🏃</span>Athlete</div>
                </div>
            </div>
        </div>

        <!-- ── Vehicle Selection ──────────────────────────────── -->
        <div class="glass card section-full">
            <div class="card-title">🚗 Vehicle Type</div>
            <div class="option-group" id="vehicleGroup">
                <div class="option-card selected" data-val="car"><span class="icon">🚗</span>Sports Car</div>
                <div class="option-card" data-val="bike"><span class="icon">🏍️</span>Motorbike</div>
                <div class="option-card" data-val="buggy"><span class="icon">🚙</span>Buggy</div>
                <div class="option-card" data-val="rocket"><span class="icon">🚀</span>Rocket</div>
                <div class="option-card" data-val="truck"><span class="icon">🚛</span>Truck</div>
            </div>
        </div>

        <!-- ── Start Button ───────────────────────────────────── -->
        <div class="start-wrap">
            <div class="preview-strip glass" id="previewStrip">
                <span class="neon-blue" id="prevA">Team A</span>
                <span class="preview-vs">VS</span>
                <span class="neon-red" id="prevB">Team B</span>
            </div>
            <button class="btn btn-primary btn-xl" id="startBtn">
                🚦 START RACE
            </button>
            <p style="font-size:.75rem;color:var(--text-dim);">Both teams ready? Hit the gas!</p>
        </div>

    </div>

    <script>
        // ── Read mode from URL ──────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'car';

        const modeData = {
            car: { icon: '🏎️', name: 'Car Race', file: 'game.html' },
            tug: { icon: '💪', name: 'Tug of War', file: 'tug.html' },
            bike: { icon: '🏍️', name: 'Bike Race', file: 'bike.html' },
            rocket: { icon: '🚀', name: 'Vertical Rocket Race', file: 'rocket.html' },
        };
        const md = modeData[gameMode] || modeData.car;
        document.getElementById('modeIcon').textContent = md.icon;
        document.getElementById('modeName').textContent = md.name;
        document.title = md.name + ' – Math Racing Setup';

        // ── Option card pickers ─────────────────────────────────
        function makePicker(groupId, single = true) {
            const group = document.getElementById(groupId);
            group.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (single) group.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    card.classList.toggle('selected');
                });
            });
        }
        makePicker('avatarA');
        makePicker('avatarB');
        makePicker('vehicleGroup');

        // ── Difficulty pills ────────────────────────────────────
        document.querySelectorAll('.diff-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                document.querySelectorAll('.diff-pill').forEach(p => p.classList.remove('selected'));
                pill.classList.add('selected');
            });
        });

        // ── Live preview ────────────────────────────────────────
        const nameA = document.getElementById('nameA');
        const nameB = document.getElementById('nameB');
        const prevA = document.getElementById('prevA');
        const prevB = document.getElementById('prevB');
        nameA.addEventListener('input', () => { prevA.textContent = nameA.value || 'Team A'; });
        nameB.addEventListener('input', () => { prevB.textContent = nameB.value || 'Team B'; });

        // ── Start ───────────────────────────────────────────────
        document.getElementById('startBtn').addEventListener('click', () => {
            const tA = nameA.value.trim() || 'Team A';
            const tB = nameB.value.trim() || 'Team B';
            const diff = document.querySelector('.diff-pill.selected')?.dataset.diff || 'medium';
            const veh = document.querySelector('#vehicleGroup .option-card.selected')?.dataset.val || 'car';
            const avA = document.querySelector('#avatarA .option-card.selected')?.dataset.val || '👦';
            const avB = document.querySelector('#avatarB .option-card.selected')?.dataset.val || '👧';
            const cls = document.getElementById('classGrade').value;
            const len = document.getElementById('raceLength').value;

            const params = new URLSearchParams({ tA, tB, diff, veh, avA, avB, cls, len, mode: gameMode });
            window.location.href = md.file + '?' + params.toString();
        });
    </script>
</body>

</html>
