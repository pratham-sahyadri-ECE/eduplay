<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard – Math Racing</title>
    <meta name="description" content="Math Racing unified leaderboard – top scores across all game modes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.09);
            --text-dim: rgba(255, 255, 255, 0.45);
            --blue: #00c6ff;
            --gold: #f9ca24;
            --green: #00e676;
            --red: #ff4e50;
            --purple: #a855f7;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #07071a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ── Animated starfield bg ── */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .page-wrap {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .lb-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #f9ca24, #ff6f00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 9px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: rgba(255, 255, 255, .75);
            font-family: 'Orbitron', monospace;
            font-size: .6rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all .2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, .12);
            color: #fff;
        }

        .action-btn.danger:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* ── Stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
            transition: transform .2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-val {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1;
        }

        .stat-lbl {
            font-size: .62rem;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ── Filter pills ── */
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .filter-pill {
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .05);
            color: var(--text-dim);
            font-family: 'Orbitron', monospace;
            font-size: .58rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-pill:hover {
            border-color: rgba(255, 255, 255, .3);
            color: rgba(255, 255, 255, .8);
        }

        .filter-pill.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(249, 202, 36, .08);
        }

        /* Mode-coloured active pills */
        .filter-pill.active[data-filter="car"] {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(0, 198, 255, .08);
        }

        .filter-pill.active[data-filter="tug"] {
            border-color: var(--red);
            color: var(--red);
            background: rgba(255, 78, 80, .08);
        }

        .filter-pill.active[data-filter="bike"] {
            border-color: var(--green);
            color: var(--green);
            background: rgba(0, 230, 118, .08);
        }

        .filter-pill.active[data-filter="rocket"] {
            border-color: var(--purple);
            color: var(--purple);
            background: rgba(168, 85, 247, .08);
        }

        .filter-pill.active[data-filter="gk"] {
            border-color: #ff9800;
            color: #ff9800;
            background: rgba(255, 152, 0, .08);
        }

        /* ── Table ── */
        .lb-table-wrap {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .88rem;
        }

        .lb-table th {
            font-family: 'Orbitron', monospace;
            font-size: .52rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            padding: 14px 14px;
            border-bottom: 1px solid var(--card-border);
            text-align: left;
            white-space: nowrap;
        }

        .lb-table td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            vertical-align: middle;
        }

        .lb-table tbody tr:last-child td {
            border-bottom: none;
        }

        .lb-table tbody tr {
            transition: background .15s;
        }

        .lb-table tbody tr:hover {
            background: rgba(255, 255, 255, .03);
        }

        /* Rank badges */
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-family: 'Orbitron', monospace;
            font-size: .65rem;
            font-weight: 700;
        }

        .rank-1 {
            background: linear-gradient(135deg, #f9ca24, #f0932b);
            color: #000;
            box-shadow: 0 0 10px rgba(249, 202, 36, .5);
        }

        .rank-2 {
            background: linear-gradient(135deg, #bdc3c7, #95a5a6);
            color: #000;
        }

        .rank-3 {
            background: linear-gradient(135deg, #cd6133, #a04000);
            color: #fff;
        }

        .rank-n {
            background: rgba(255, 255, 255, .08);
            color: var(--text-dim);
        }

        /* Game mode badges */
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-family: 'Orbitron', monospace;
            font-size: .48rem;
            letter-spacing: 1px;
            font-weight: 700;
            white-space: nowrap;
        }

        .mode-car {
            background: rgba(0, 198, 255, .15);
            border: 1px solid rgba(0, 198, 255, .35);
            color: var(--blue);
        }

        .mode-tug {
            background: rgba(255, 78, 80, .15);
            border: 1px solid rgba(255, 78, 80, .35);
            color: var(--red);
        }

        .mode-bike {
            background: rgba(0, 230, 118, .15);
            border: 1px solid rgba(0, 230, 118, .35);
            color: var(--green);
        }

        .mode-rocket {
            background: rgba(168, 85, 247, .15);
            border: 1px solid rgba(168, 85, 247, .35);
            color: var(--purple);
        }

        .mode-gk {
            background: rgba(255, 152, 0, .15);
            border: 1px solid rgba(255, 152, 0, .4);
            color: #ff9800;
        }

        /* Difficulty badges */
        .diff-badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: .6rem;
            font-weight: 600;
            letter-spacing: .5px;
        }

        .diff-easy {
            background: rgba(0, 230, 118, .15);
            color: var(--green);
        }

        .diff-medium {
            background: rgba(249, 202, 36, .15);
            color: var(--gold);
        }

        .diff-hard {
            background: rgba(255, 78, 80, .15);
            color: var(--red);
        }

        /* Accuracy bar */
        .acc-bar {
            display: inline-block;
            width: 60px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .1);
            vertical-align: middle;
            overflow: hidden;
            margin-left: 6px;
        }

        .acc-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #0072ff, #00c6ff);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: var(--text-dim);
        }

        .empty-state .ei {
            font-size: 4rem;
            display: block;
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {

            .lb-table th:nth-child(6),
            .lb-table td:nth-child(6) {
                display: none;
            }
        }
    </style>
</head>

<body>
    <canvas id="starfield"></canvas>

    <div class="page-wrap">

        <!-- Top bar -->
        <div class="top-bar">
            <div class="lb-title">🏆 Leaderboard</div>
            <div class="top-actions">
                <a href="index.html" class="action-btn">🎮 Game Select</a>
                <a href="setup.html" class="action-btn">+ New Game</a>
                <button class="action-btn danger" id="clearBtn">🗑 Clear All</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" style="color:var(--gold)" id="statTotal">0</div>
                <div class="stat-lbl">Total Races</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" style="color:var(--blue)" id="statAvgAcc">—</div>
                <div class="stat-lbl">Avg Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" style="color:var(--red)" id="statBest">—</div>
                <div class="stat-lbl">Top Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" style="color:var(--green)" id="statFastTime">—</div>
                <div class="stat-lbl">Fastest Race</div>
            </div>
        </div>

        <!-- Filter pills -->
        <div class="filter-row">
            <button class="filter-pill active" data-filter="all">All Games</button>
            <button class="filter-pill" data-filter="car">🏎️ Car Race</button>
            <button class="filter-pill" data-filter="tug">💪 Tug of War</button>
            <button class="filter-pill" data-filter="bike">🏍️ Bike Race</button>
            <button class="filter-pill" data-filter="rocket">🚀 Rocket Race</button>
            <button class="filter-pill" data-filter="gk">🧠 GK Race</button>
            <button class="filter-pill" data-filter="easy" style="margin-left:auto">Easy</button>
            <button class="filter-pill" data-filter="medium">Medium</button>
            <button class="filter-pill" data-filter="hard">Hard</button>
        </div>

        <!-- Table -->
        <div class="lb-table-wrap">
            <div class="empty-state" id="emptyState" style="display:none">
                <span class="ei">🏁</span>
                <p style="font-size:1rem;font-weight:600;margin:0 0 8px">No races recorded yet</p>
                <p style="font-size:.85rem;margin:0">Play any game mode to see results here!</p>
                <a href="index.html"
                    style="display:inline-block;margin-top:20px;padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;font-family:Orbitron,monospace;font-size:.65rem;letter-spacing:1px;text-decoration:none">🎮
                    SELECT A GAME</a>
            </div>
            <table class="lb-table" id="lbTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Player</th>
                        <th>Game Mode</th>
                        <th>Score</th>
                        <th>Accuracy</th>
                        <th>Difficulty</th>
                        <th>Time</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="lbBody"></tbody>
            </table>
        </div>

    </div>

    <script>
        // ── Starfield ────────────────────────────────────────────────────
        (function () {
            const c = document.getElementById('starfield');
            const ctx = c.getContext('2d');
            let stars = [];
            function init() {
                c.width = window.innerWidth; c.height = window.innerHeight;
                stars = Array.from({ length: 120 }, () => ({
                    x: Math.random() * c.width, y: Math.random() * c.height,
                    r: 0.4 + Math.random() * 1.3, a: 0.3 + Math.random() * 0.7,
                    sp: 0.2 + Math.random() * 0.5
                }));
            }
            let t = 0;
            function draw() {
                ctx.clearRect(0, 0, c.width, c.height);
                stars.forEach(s => {
                    ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(t * s.sp + s.x));
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                });
                ctx.globalAlpha = 1; t += 0.01;
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', init);
            init(); draw();
        })();

        // ── Data ────────────────────────────────────────────────────────
        const STORAGE_KEY = 'mathRacingLeaderboard';

        const MODE_META = {
            car: { icon: '🏎️', label: 'Car Race', cls: 'mode-car' },
            tug: { icon: '💪', label: 'Tug of War', cls: 'mode-tug' },
            bike: { icon: '🏍️', label: 'Bike Race', cls: 'mode-bike' },
            rocket: { icon: '🚀', label: 'Rocket Race', cls: 'mode-rocket' },
            'gk-car': { icon: '🧠', label: 'GK – Car', cls: 'mode-gk' },
            'gk-tug': { icon: '🧠', label: 'GK – Tug', cls: 'mode-gk' },
            'gk-bike': { icon: '🧠', label: 'GK – Bike', cls: 'mode-gk' },
            'gk-rocket': { icon: '🧠', label: 'GK – Rocket', cls: 'mode-gk' },
        };

        function loadEntries() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch { return []; }
        }

        function fmtTime(secs) {
            if (!secs) return '—';
            const m = Math.floor(secs / 60), s = Math.round(secs % 60);
            return m > 0 ? `${m}m ${s}s` : `${s}s`;
        }

        function fmtDate(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function rankClass(i) {
            return ['rank-1', 'rank-2', 'rank-3'][i] || 'rank-n';
        }

        let currentFilter = 'all';
        let allEntries = loadEntries();

        // Difficulty filter pills are separate from mode filters
        const diffFilters = new Set(['easy', 'medium', 'hard']);

        function render() {
            let entries = [...allEntries];

            if (currentFilter === 'all') {
                // no filter
            } else if (diffFilters.has(currentFilter)) {
                entries = entries.filter(e => e.difficulty === currentFilter);
            } else if (currentFilter === 'gk') {
                entries = entries.filter(e => (e.gameMode || '').startsWith('gk'));
            } else {
                entries = entries.filter(e => (e.gameMode || 'car') === currentFilter);
            }

            entries.sort((a, b) => b.score - a.score || b.accuracy - a.accuracy);

            const body = document.getElementById('lbBody');
            const emptyState = document.getElementById('emptyState');
            const table = document.getElementById('lbTable');

            if (entries.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                table.style.display = 'table';
                emptyState.style.display = 'none';
                body.innerHTML = entries.map((e, i) => {
                    const mode = e.gameMode || 'car';
                    const mm = MODE_META[mode] || MODE_META.car;
                    const diff = e.difficulty || 'medium';
                    return `
                    <tr>
                        <td><span class="rank-badge ${rankClass(i)}">${i + 1}</span></td>
                        <td>
                            <span style="margin-right:6px;font-size:1.1rem">${e.avatar || '👤'}</span>
                            <strong>${e.name}</strong>
                            ${e.vehicle ? `<span style="color:var(--text-dim);font-size:.8rem;margin-left:6px">${e.vehicle}</span>` : ''}
                        </td>
                        <td><span class="mode-badge ${mm.cls}">${mm.icon} ${mm.label}</span></td>
                        <td><strong style="color:var(--blue);font-family:'Orbitron',monospace">${e.score}</strong><span style="color:var(--text-dim);font-size:.75rem"> pts</span></td>
                        <td>
                            <span>${e.accuracy}%</span>
                            <span class="acc-bar"><span class="acc-fill" style="width:${e.accuracy}%"></span></span>
                        </td>
                        <td><span class="diff-badge diff-${diff}">${diff}</span></td>
                        <td style="color:var(--text-dim)">${fmtTime(e.timeSecs)}</td>
                        <td style="color:var(--text-dim);font-size:.78rem">${fmtDate(e.timestamp)}</td>
                    </tr>`;
                }).join('');
            }

            // Update global stats (based on all entries, not filtered)
            document.getElementById('statTotal').textContent = allEntries.length;
            if (allEntries.length) {
                const avgAcc = Math.round(allEntries.reduce((s, e) => s + (e.accuracy || 0), 0) / allEntries.length);
                document.getElementById('statAvgAcc').textContent = avgAcc + '%';
                document.getElementById('statBest').textContent = Math.max(...allEntries.map(e => e.score)) + ' pts';
                const times = allEntries.filter(e => e.timeSecs).map(e => e.timeSecs);
                document.getElementById('statFastTime').textContent = times.length ? fmtTime(Math.min(...times)) : '—';
            }
        }

        // ── Filter pills ────────────────────────────────────────────────
        document.querySelectorAll('.filter-pill').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        // ── Clear ───────────────────────────────────────────────────────
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Clear ALL leaderboard data? This cannot be undone.')) {
                localStorage.removeItem(STORAGE_KEY);
                allEntries = [];
                render();
            }
        });

        render();
    </script>
</body>

</html>
