<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tug of War – Math Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --blue: #00c6ff;
            --red: #ff4e50;
            --gold: #f9ca24;
            --bg: #07071a;
            --panel: rgba(255, 255, 255, 0.04);
            --panel-border: rgba(255, 255, 255, 0.09);
            --text-dim: rgba(255, 255, 255, 0.45);
            --font-racing: 'Orbitron', monospace;
            --font-body: 'Inter', sans-serif;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: var(--font-body);
            overflow: hidden;
            height: 100vh;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--panel-border);
        }

        .hud-team {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .hud-team.right {
            align-items: flex-end;
        }

        .team-name {
            font-family: var(--font-racing);
            font-size: .7rem;
            letter-spacing: 2px;
        }

        .score-big {
            font-family: var(--font-racing);
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1;
        }

        .score-big.blue {
            color: var(--blue);
            text-shadow: 0 0 20px var(--blue);
        }

        .score-big.red {
            color: var(--red);
            text-shadow: 0 0 20px var(--red);
        }

        .hud-center {
            text-align: center;
        }

        .q-box {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 12px;
            padding: 8px 18px;
        }

        .q-label {
            font-family: var(--font-racing);
            font-size: .55rem;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .q-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 2px;
        }

        /* Canvas */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .canvas-wrap {
            position: fixed;
            inset: 0;
            top: 74px;
        }

        /* Input row */
        .input-row {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--panel-border);
        }

        .input-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
        }

        .input-cell.right {
            border-left: 1px solid var(--panel-border);
        }

        .input-cell input {
            flex: 1;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: .95rem;
            font-family: var(--font-racing);
            outline: none;
        }

        .input-cell input:focus {
            border-color: var(--gold);
        }

        .input-cell button {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: var(--font-racing);
            font-size: .6rem;
            letter-spacing: 1px;
            font-weight: 700;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn-a {
            background: linear-gradient(135deg, var(--blue), #0072ff);
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 198, 255, .4);
        }

        .btn-b {
            background: linear-gradient(135deg, var(--red), #fc913a);
            color: #fff;
            box-shadow: 0 0 12px rgba(255, 78, 80, .4);
        }

        /* Feedback */
        .answer-feedback {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 24px;
            border-radius: 30px;
            font-family: var(--font-racing);
            font-size: .72rem;
            letter-spacing: 1px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .3s;
            z-index: 20;
            white-space: nowrap;
        }

        .answer-feedback.correct {
            background: rgba(0, 230, 118, .2);
            border: 1px solid #00e676;
            color: #00e676;
        }

        .answer-feedback.wrong {
            background: rgba(255, 78, 80, .2);
            border: 1px solid var(--red);
            color: var(--red);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(16px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-title {
            font-family: var(--font-racing);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            text-align: center;
        }

        .overlay-sub {
            font-size: .9rem;
            color: var(--text-dim);
            text-align: center;
        }

        .overlay-btn {
            padding: 14px 36px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: var(--font-racing);
            font-size: .75rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--blue), #0072ff);
            color: #fff;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(0, 198, 255, .5);
            transition: transform .2s;
        }

        .overlay-btn:hover {
            transform: scale(1.06);
        }

        /* Countdown */
        .countdown-num {
            font-family: var(--font-racing);
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 900;
            animation: pop .4s ease;
        }

        @keyframes pop {
            from {
                transform: scale(1.8);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .neon-gold {
            color: var(--gold);
            text-shadow: 0 0 40px var(--gold);
        }

        .neon-blue {
            color: var(--blue);
            text-shadow: 0 0 40px var(--blue);
        }

        /* confetti canvas */
        #confettiCanvas {
            position: fixed;
            inset: 0;
            z-index: 60;
            pointer-events: none;
        }

        /* Back btn */
        .back-btn {
            position: fixed;
            top: 14px;
            right: 16px;
            z-index: 20;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            color: rgba(255, 255, 255, .6);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: .65rem;
            cursor: pointer;
            font-family: var(--font-racing);
            letter-spacing: 1px;
            transition: all .2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .13);
            color: #fff;
        }

        /* Rope meter */
        .rope-meter {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: min(500px, 80vw);
            z-index: 10;
        }

        .rope-meter-bar {
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .15);
        }

        .rope-meter-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #0072ff);
            transition: width .4s cubic-bezier(.34, 1.56, .64, 1);
            width: 50%;
        }

        /* WS dot */
        .ws-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-racing);
            font-size: .52rem;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ws-dot.connected {
            background: #00e676;
            box-shadow: 0 0 6px #00e676;
        }

        .ws-dot.disconnected {
            background: #666;
        }

        .rope-meter-labels {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-racing);
            font-size: .55rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-top: 4px;
        }
    </style>
</head>

    <script src="audio.js"></script>

    <script src="game.js"></script>
    
    <!-- Enhanced Keypad Integration -->
    <script>
    (function() {
        'use strict';
        const WS_HOST = '172.21.7.4';
        const WS_PORT = 8765;
        const RECONNECT_DELAY = 3000;
        let socket = null;
        let reconnectTimer = null;
        let isConnected = false;
        
        function connect() {
            try {
                socket = new WebSocket(`ws://${WS_HOST}:${WS_PORT}`);
                socket.onopen = function() {
                    console.log('✅ Keypad connected');
                    isConnected = true;
                    if (typeof setWsDot === 'function') setWsDot(true);
                    if (reconnectTimer) clearTimeout(reconnectTimer);
                };
                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.team && data.key) {
                            handleInput(data.team, data.key);
                        }
                    } catch (e) {
                        const raw = event.data.trim();
                        const match = raw.match(/^([AB]):(.+)$/i);
                        if (match && typeof handleAnswer === 'function') {
                            handleAnswer(match[1].toUpperCase(), match[2]);
                        }
                    }
                };
                socket.onerror = function() {
                    isConnected = false;
                    if (typeof setWsDot === 'function') setWsDot(false);
                };
                socket.onclose = function() {
                    isConnected = false;
                    if (typeof setWsDot === 'function') setWsDot(false);
                    reconnectTimer = setTimeout(connect, RECONNECT_DELAY);
                };
            } catch (error) {
                reconnectTimer = setTimeout(connect, RECONNECT_DELAY);
            }
        }
        
        function handleInput(team, key) {
            const input = document.getElementById('input' + team);
            if (!input) return;
            if (key === '#') {
                const btn = document.getElementById('submit' + team);
                if (btn) btn.click();
            } else if (key === '*') {
                input.value = '';
            } else if (/^[0-9\-.]$/.test(key)) {
                input.value += key;
            }
        }
        
        window.KeypadBridge = { isConnected: () => isConnected, reconnect: connect };
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', connect);
        } else {
            connect();
        }
    })();
    </script>
    
    <script>
        // ── WebSocket (ESP32 keypad) ─────────────────────────────────────
        let ws = null, wsConnected = false;
        function connectWS() {
            try {
                ws = new WebSocket('ws://localhost:8765');
                ws.onopen = () => { wsConnected = true; setWsDot(true); };
                ws.onclose = () => { wsConnected = false; setWsDot(false); setTimeout(connectWS, 3000); };
                ws.onerror = () => { };
                ws.onmessage = (ev) => {
                    const match = ev.data.trim().match(/^([AB]):(.+)$/i);
                    if (match && GS.state === GameLogic.STATE.RACING && GS.currentQuestion) {
                        handleAnswer(match[1].toUpperCase(), match[2]);
                    }
                };
            } catch (e) { }
        }
        function sendWS(cmd) { if (ws && wsConnected) try { ws.send(cmd); } catch (e) { } }
        function setWsDot(on) {
            const dot = document.getElementById('wsDot'), txt = document.getElementById('wsStatus');
            if (dot) dot.className = 'ws-dot ' + (on ? 'connected' : 'disconnected');
            if (txt) txt.textContent = on ? 'ESP32 Connected' : 'No Hardware';
        }

        // ── Config from URL ──────────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const CONFIG = {
            nameA: params.get('tA') || 'Team A',
            nameB: params.get('tB') || 'Team B',
            difficulty: params.get('diff') || 'medium',
            avA: params.get('avA') || '👦',
            avB: params.get('avB') || '👧',
            gameMode: 'tug',
        };

        // ── Rope state ───────────────────────────────────────────────────
        // ropePos: 0=full A wins, 1=full B wins, 0.5=center
        let ropePos = 0.5;
        const ROPE_WIN_THRESHOLD = 1 / 6; // 6 correct = reach the edge

        // ── Game state ───────────────────────────────────────────────────
        const GS = GameLogic.createGameState({ difficulty: CONFIG.difficulty, nameA: CONFIG.nameA, nameB: CONFIG.nameB, raceLength: 6 });

        // ── Canvas ───────────────────────────────────────────────────────
        const canvas = document.getElementById('tugCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.addEventListener('resize', resize); resize();

        // ── Rope particles ───────────────────────────────────────────────
        const tugParticles = [];
        function spawnTugSpark(x, y, color) {
            for (let i = 0; i < 12; i++) {
                tugParticles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1, decay: 0.05 + Math.random() * 0.04,
                    size: 3 + Math.random() * 5, color
                });
            }
        }

        // ── Characters ───────────────────────────────────────────────────
        let charALean = 0, charBLean = 0;
        let charAPull = false, charBPull = false;
        let charAPullTimer = 0, charBPullTimer = 0;
        let shakeX = 0, shakeY = 0, shakeStr = 0;
        function trigShake(s) { shakeStr = s; }
        function updateShake() {
            if (shakeStr > 0) {
                shakeX = (Math.random() - 0.5) * shakeStr;
                shakeY = (Math.random() - 0.5) * shakeStr;
                shakeStr *= 0.8;
                if (shakeStr < 0.5) shakeStr = 0;
            } else { shakeX = 0; shakeY = 0; }
        }

        // ── Render ───────────────────────────────────────────────────────
        let bgOffset = 0;
        function drawBg() {
            const W = canvas.width, H = canvas.height;
            // Sky
            const sky = ctx.createLinearGradient(0, 0, 0, H * 0.6);
            sky.addColorStop(0, '#0a0a2a');
            sky.addColorStop(1, '#1a0e3a');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, H);

            // Stars
            for (let i = 0; i < 80; i++) {
                const sx = ((i * 137 + bgOffset * 0.03) % W + W) % W;
                const sy = (i * 53) % (H * 0.55);
                ctx.fillStyle = `rgba(255,255,255,${0.3 + 0.4 * Math.sin(i + Date.now() * 0.0005)})`;
                ctx.beginPath(); ctx.arc(sx, sy, 0.8, 0, Math.PI * 2); ctx.fill();
            }

            // Ground
            const ground = ctx.createLinearGradient(0, H * 0.55, 0, H);
            ground.addColorStop(0, '#1a1a1a');
            ground.addColorStop(1, '#0d0d0d');
            ctx.fillStyle = ground;
            ctx.fillRect(0, H * 0.55, W, H * 0.45);

            // Crowd in background
            const crowd = ['🧑', '👩', '👦', '👧', '🙋', '🙌', '👴', '👵'];
            ctx.font = '14px serif';
            for (let i = 0; i < 24; i++) {
                const ex = ((i * 61 + bgOffset * 0.07) % W + W) % W;
                const ey = H * 0.52 - (i % 3) * 14 - 8;
                ctx.fillText(crowd[i % crowd.length], ex, ey);
            }
        }

        function drawRope(W, H) {
            const groundY = H * 0.62;
            const cx = W / 2;
            // Rope pulls toward winning side
            const pullOffset = (ropePos - 0.5) * W * 0.5; // -W/4 to +W/4

            // Rope knot center
            const knotX = cx + pullOffset;
            const knotY = groundY - H * 0.12;

            // Rope segments with sag
            const segs = 30;
            const leftX = W * 0.08, rightX = W * 0.92;
            ctx.strokeStyle = '#c8a96e';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 6;
            ctx.shadowColor = 'rgba(200,169,110,0.5)';

            // Draw rope as quadratic bezier with sag
            ctx.beginPath();
            ctx.moveTo(leftX, knotY - 20);
            const sagL = knotY + 30;
            ctx.quadraticCurveTo((leftX + knotX) / 2, sagL, knotX, knotY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(knotX, knotY);
            const sagR = knotY + 30;
            ctx.quadraticCurveTo((knotX + rightX) / 2, sagR, rightX, knotY - 20);
            ctx.stroke();

            ctx.shadowBlur = 0;

            // Rope stripes
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.setLineDash([5, 14]);
            ctx.beginPath();
            ctx.moveTo(leftX, knotY - 20);
            ctx.quadraticCurveTo((leftX + knotX) / 2, sagL, knotX, knotY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(knotX, knotY);
            ctx.quadraticCurveTo((knotX + rightX) / 2, sagR, rightX, knotY - 20);
            ctx.stroke();
            ctx.setLineDash([]);

            // Center knot
            ctx.beginPath();
            ctx.arc(knotX, knotY, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#e8c46a';
            ctx.shadowBlur = 16;
            ctx.shadowColor = '#f9ca24';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff8';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Win zone flags
            const leftFlag = W * 0.2, rightFlag = W * 0.8;
            ctx.strokeStyle = '#00e676';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(leftFlag, knotY - 80); ctx.lineTo(leftFlag, knotY + 40); ctx.stroke();
            ctx.fillStyle = '#00e676';
            ctx.font = '11px Orbitron,monospace';
            ctx.textAlign = 'center';
            ctx.fillText('A WIN ZONE', leftFlag, knotY - 88);

            ctx.strokeStyle = '#ff4e50';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(rightFlag, knotY - 80); ctx.lineTo(rightFlag, knotY + 40); ctx.stroke();
            ctx.fillStyle = '#ff4e50';
            ctx.fillText('B WIN ZONE', rightFlag, knotY - 88);

            return { knotX, knotY };
        }

        function drawCharacter(x, y, avatar, color, leanDir, pulling) {
            ctx.save();
            ctx.translate(x, y);
            // Lean based on pull direction
            const lean = leanDir * (pulling ? 0.25 : 0.08);
            ctx.rotate(lean);

            // Body glow
            if (pulling) {
                ctx.shadowBlur = 25;
                ctx.shadowColor = color;
            }

            // Body
            const bw = 48, bh = 60;
            const grad = ctx.createLinearGradient(-bw / 2, -bh, bw / 2, 0);
            grad.addColorStop(0, color + 'cc');
            grad.addColorStop(1, color + '44');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(-bw / 2, -bh, bw, bh, 10);
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Avatar face
            ctx.font = '28px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 0;
            ctx.fillText(avatar, 0, -bh * 0.55);

            // Arms
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            // Left arm
            ctx.beginPath();
            ctx.moveTo(-bw / 2, -bh * 0.5);
            ctx.lineTo(-bw * 0.85, -bh * 0.3 + (pulling ? 8 : 0));
            ctx.stroke();
            // Right arm
            ctx.beginPath();
            ctx.moveTo(bw / 2, -bh * 0.5);
            ctx.lineTo(bw * 0.85, -bh * 0.3 + (pulling ? 8 : 0));
            ctx.stroke();

            // Legs
            ctx.strokeStyle = color + 'aa';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(-8, 0); ctx.lineTo(-14, 30); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(8, 0); ctx.lineTo(14, 30); ctx.stroke();

            // Pull force indicator
            if (pulling) {
                ctx.font = '20px serif';
                ctx.fillText('💥', leanDir < 0 ? -60 : 60, -bh * 0.5);
            }

            ctx.restore();
        }

        function drawFrame() {
            const W = canvas.width, H = canvas.height;
            updateShake();
            ctx.save();
            ctx.translate(shakeX, shakeY);
            ctx.clearRect(-20, -20, W + 40, H + 40);

            drawBg();
            bgOffset += 0.4;

            const { knotX, knotY } = drawRope(W, H);
            const groundY = H * 0.62;

            // Characters
            const charY = groundY - 10;
            charALean += ((-0.18) - charALean) * 0.1;
            charBLean += ((0.18) - charBLean) * 0.1;
            if (charAPullTimer > 0) { charAPullTimer--; charAPull = charAPullTimer > 0; }
            if (charBPullTimer > 0) { charBPullTimer--; charBPull = charBPullTimer > 0; }

            drawCharacter(W * 0.12, charY, CONFIG.avA, '#00c6ff', -1, charAPull);
            drawCharacter(W * 0.88, charY, CONFIG.avB, '#ff4e50', 1, charBPull);

            // Particles
            for (let i = tugParticles.length - 1; i >= 0; i--) {
                const p = tugParticles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.15;
                p.life -= p.decay;
                if (p.life <= 0) { tugParticles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }

            ctx.restore();

            // Update rope meter UI
            document.getElementById('ropeMeter').style.width = ((1 - ropePos) * 100) + '%';
            document.getElementById('scoreA').textContent = GS.teamA.score;
            document.getElementById('scoreB').textContent = GS.teamB.score;
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            if (GS.state === GameLogic.STATE.RACING || GS.state === GameLogic.STATE.COUNTDOWN || GS.state === GameLogic.STATE.VICTORY) {
                drawFrame();
            }
        }
        requestAnimationFrame(gameLoop);

        // ── Answer handling ───────────────────────────────────────────────
        function handleAnswer(team, rawAnswer) {
            if (GS.state !== GameLogic.STATE.RACING) return;
            const result = GameLogic.validateAnswer(GS, team, rawAnswer);
            GameLogic.applyAnswer(GS, team, result.correct);

            if (result.correct) {
                AudioEngine.playEngineBoost();
                if (team === 'A') {
                    ropePos = Math.max(0, ropePos - 1 / 6);
                    charAPull = true; charAPullTimer = 35;
                    spawnTugSpark(canvas.width * 0.5, canvas.height * 0.5, '#00c6ff');
                } else {
                    ropePos = Math.min(1, ropePos + 1 / 6);
                    charBPull = true; charBPullTimer = 35;
                    spawnTugSpark(canvas.width * 0.5, canvas.height * 0.5, '#ff4e50');
                }
                trigShake(7);
                showFeedback(team, true, rawAnswer);
                sendWS(team === 'A' ? 'MOVE_A' : 'MOVE_B');

                // Check win
                setTimeout(() => {
                    if (ropePos <= 0) { triggerVictory('A'); return; }
                    if (ropePos >= 1) { triggerVictory('B'); return; }
                    setTimeout(showNextQ, 500);
                }, 250);
            } else {
                AudioEngine.playBuzz();
                showFeedback(team, false, rawAnswer);
                sendWS(team === 'A' ? 'BUZZ_A' : 'BUZZ_B');
                setTimeout(showNextQ, 500);
            }
        }

        function showFeedback(team, correct, ans) {
            const name = team === 'A' ? CONFIG.nameA : CONFIG.nameB;
            const el = document.getElementById('answerFeedback');
            el.textContent = correct ? `✅ ${name}: ${ans} — CORRECT! Pull! 💪` : `❌ ${name}: ${ans} — Wrong!`;
            el.className = 'answer-feedback ' + (correct ? 'correct' : 'wrong');
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 1800);
        }

        function showNextQ() {
            if (GS.state !== GameLogic.STATE.RACING) return;
            const q = GameLogic.nextQuestion(GS);
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('questionNum').textContent = 'Q' + (GS.questionNum + 1);
        }

        // ── Victory ───────────────────────────────────────────────────────
        function triggerVictory(winner) {
            GS.state = GameLogic.STATE.VICTORY;
            AudioEngine.playVictory();
            const name = winner === 'A' ? CONFIG.nameA : CONFIG.nameB;
            const loser = winner === 'A' ? CONFIG.nameB : CONFIG.nameA;
            const winTeam = winner === 'A' ? GS.teamA : GS.teamB;
            const loseTeam = winner === 'A' ? GS.teamB : GS.teamA;
            const elapsed = GS.startTime ? Math.round((Date.now() - GS.startTime) / 1000) : null;
            // Save both teams to leaderboard
            GameLogic.saveResult({ ...CONFIG, avA: winner === 'A' ? CONFIG.avA : CONFIG.avB }, winTeam, winTeam.score, winTeam.correct, GS.questionNum, elapsed);
            GameLogic.saveResult({ ...CONFIG, avA: winner === 'A' ? CONFIG.avB : CONFIG.avA }, loseTeam, loseTeam.score, loseTeam.correct, GS.questionNum, elapsed);
            document.getElementById('victoryTeam').textContent = name + ' WINS! 💪';
            document.getElementById('victoryTeam').style.color = winner === 'A' ? '#00c6ff' : '#ff4e50';
            document.getElementById('victoryScores').textContent = `Correct Pulls: ${winTeam.score} | Questions: ${GS.questionNum}`;
            document.getElementById('victoryOverlay').classList.add('visible');
            const cc = document.getElementById('confettiCanvas');
            cc.width = window.innerWidth; cc.height = window.innerHeight;
            new Physics.ConfettiSystem(cc).start();
        }

        // ── Countdown ─────────────────────────────────────────────────────
        function startCountdown() {
            GS.state = GameLogic.STATE.COUNTDOWN;
            const ov = document.getElementById('countdownOverlay');
            const num = document.getElementById('countdownNum');
            ov.classList.add('visible');
            let count = 3;
            num.textContent = count;
            AudioEngine.playCountdownBeep(440);
            const iv = setInterval(() => {
                count--;
                if (count > 0) {
                    num.textContent = count;
                    num.style.animation = 'none'; void num.offsetWidth; num.style.animation = '';
                    AudioEngine.playCountdownBeep(440);
                } else {
                    clearInterval(iv);
                    num.textContent = 'GO!'; num.className = 'countdown-num neon-gold';
                    num.style.animation = 'none'; void num.offsetWidth; num.style.animation = '';
                    AudioEngine.playGo();
                    setTimeout(() => { ov.classList.remove('visible'); beginRace(); }, 700);
                }
            }, 900);
        }

        function beginRace() {
            GS.state = GameLogic.STATE.RACING;
            GS.startTime = Date.now();
            AudioEngine.startRaceAmbience();
            showNextQ();
        }

        // ── Input handlers ────────────────────────────────────────────────
        function submitTeam(team) {
            if (GS.state !== GameLogic.STATE.RACING) return;
            const inp = document.getElementById('input' + team);
            const raw = inp.value.trim();
            if (!raw) return;
            handleAnswer(team, raw);
            inp.value = ''; inp.focus();
        }
        document.getElementById('submitA').addEventListener('click', () => submitTeam('A'));
        document.getElementById('submitB').addEventListener('click', () => submitTeam('B'));
        document.getElementById('inputA').addEventListener('keydown', e => { if (e.key === 'Enter') submitTeam('A'); });
        document.getElementById('inputB').addEventListener('keydown', e => { if (e.key === 'Enter') submitTeam('B'); });

        // ── Init ──────────────────────────────────────────────────────────
        document.getElementById('teamAName').textContent = CONFIG.nameA;
        document.getElementById('teamBName').textContent = CONFIG.nameB;

        connectWS();
        startCountdown();
    </script>
</body>

</html>
